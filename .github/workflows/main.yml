name: Build Screensaver

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore HtmlScreensaver.csproj

      - name: Publish self-contained single .exe
        run: |
          dotnet publish HtmlScreensaver.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish\

      - name: Rename .exe to .scr
        run: |
          Copy-Item publish\HtmlScreensaver.exe publish\HtmlScreensaver.scr

      - name: Upload .scr as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HtmlScreensaver-scr
          path: publish\HtmlScreensaver.scr
          retention-days: 30
